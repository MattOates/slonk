site_name: Slonk
site_description: Typed data pipelines with operator-overloaded | syntax
site_author: Matt Oates
site_url: https://MattOates.github.io/slonk/

repo_name: slonk
repo_url: https://github.com/MattOates/slonk

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Guide:
      - Overview: guide/overview.md
      - Pipeline Concepts: guide/concepts.md
      - Handlers: guide/handlers.md
      - Middleware: guide/middleware.md
      - Parallel Execution: guide/parallel.md
  - API Reference:
      - slonk: reference/index.md
      - Pipeline: reference/pipeline.md
      - Roles & Protocols: reference/roles.md
      - Handlers: reference/handlers.md
      - Middleware: reference/middleware.md
      - Built-in Middleware: reference/builtin_middleware.md
      - Internals: reference/internals.md
  - Contributing: contributing.md
  - Changelog: changelog.md
